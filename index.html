<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
<title>Mystery Box</title>
<link rel="stylesheet" href="styles.css" />

<!-- PWA: manifest + icons (all relative — deployed under a Pages subpath) -->
<link rel="manifest" href="manifest.webmanifest" />
<meta name="theme-color" content="#6c4ef5" />
<link rel="icon" href="assets/icons/icon-192.png" sizes="192x192" type="image/png" />
<link rel="icon" href="assets/icons/icon-512.png" sizes="512x512" type="image/png" />
<link rel="apple-touch-icon" href="assets/icons/apple-touch-icon.png" />

<!-- iOS standalone home-screen app behaviour -->
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Mystery Box" />
</head>
<body>

<!-- ============ PRESET LIST (saved boxes) ============ -->
<section id="preset-screen" hidden>
  <h1 class="title">Mystery Box</h1>

  <div id="preset-list" class="preset-list" aria-live="polite"></div>

  <button id="preset-new-button" class="go-button" type="button">New box</button>

  <button id="preset-grownups-button" class="grownups-button grownups-button-static" type="button" aria-label="Grown-ups options">
    Grown-ups
  </button>
</section>

<!-- ============ MANAGE PRESETS SHEET (grown-up gated) ============ -->
<div id="manage-presets-sheet" class="sheet-backdrop" hidden>
  <div class="sheet manage-presets-content" role="dialog" aria-modal="true" aria-label="Manage boxes">
    <p class="sheet-title">Manage boxes</p>
    <div id="manage-presets-list" class="manage-presets-list"></div>
    <button id="manage-presets-done" class="parent-action parent-action-done" type="button">Done</button>
  </div>
</div>

<!-- ============ SETUP SCREEN (parent) ============ -->
<section id="setup-screen" hidden>
  <h1 class="title">Mystery Box</h1>

  <div id="chip-list" class="chip-list" aria-live="polite"></div>

  <div class="setup-links">
    <button id="save-box-button" class="clear-button" type="button" hidden>Save box</button>
    <button id="clear-button" class="clear-button" type="button" hidden>Clear all</button>
  </div>

  <div id="photo-toast" class="toast" role="status" aria-live="polite" hidden>Didn&rsquo;t work &mdash; try again</div>

  <div class="entry-row">
    <button id="photo-button" class="photo-button" type="button" aria-label="Add a photo option">📷</button>
    <input
      id="option-input"
      type="text"
      inputmode="text"
      autocomplete="off"
      autocorrect="off"
      autocapitalize="off"
      placeholder="Type an option&hellip;"
      class="option-input"
    />
    <button id="add-button" class="add-button" type="button" aria-label="Add option">Add</button>
  </div>

  <!-- Hidden file inputs behind the entry row's 📷 button and the photo
       sheet's Retake/Choose actions. Two inputs (not one) so Retake can
       hint the camera directly while Choose from library hints the
       library — both still let iOS show its full picker sheet either way,
       per SPEC.md workstream A1. -->
  <input id="photo-capture-input" type="file" accept="image/*" capture="environment" hidden />
  <input id="photo-library-input" type="file" accept="image/*" hidden />

  <p id="count-hint" class="count-hint"></p>

  <button id="go-button" class="go-button" type="button" disabled>GO</button>
</section>

<!-- ============ TAP-TO-FIX EMOJI PICKER SHEET ============ -->
<div id="emoji-picker-sheet" class="sheet-backdrop" hidden>
  <div class="sheet" role="dialog" aria-modal="true" aria-label="Choose an emoji">
    <div class="sheet-header">
      <input
        id="emoji-search"
        type="text"
        inputmode="text"
        autocomplete="off"
        autocorrect="off"
        autocapitalize="off"
        placeholder="Search&hellip;"
        class="emoji-search"
      />
      <button id="emoji-picker-close" class="sheet-close" type="button" aria-label="Close">&times;</button>
    </div>
    <div id="emoji-suggestion-grid" class="emoji-grid"></div>
  </div>
</div>

<!-- ============ TAP-TO-OPEN PHOTO SHEET ============ -->
<div id="photo-sheet" class="sheet-backdrop" hidden>
  <div class="sheet photo-sheet-content" role="dialog" aria-modal="true" aria-label="Photo options">
    <button id="photo-retake" class="parent-action" type="button">Retake photo</button>
    <button id="photo-choose" class="parent-action" type="button">Choose from library</button>
    <button id="photo-remove" class="parent-action" type="button">Remove photo</button>
    <button id="photo-sheet-close" class="parent-action" type="button">Cancel</button>
  </div>
</div>

<!-- ============ SAVE-AS-PRESET SHEET ("Keep this box?") ============ -->
<div id="save-preset-sheet" class="sheet-backdrop" hidden>
  <div class="sheet save-preset-content" role="dialog" aria-modal="true" aria-label="Keep this box?">
    <p class="sheet-title">Keep this box?</p>
    <div class="save-preset-row">
      <button id="preset-icon-button" class="chip-emoji preset-icon-button" type="button" aria-label="Change this box's icon"></button>
      <input
        id="preset-name-input"
        type="text"
        inputmode="text"
        autocomplete="off"
        autocorrect="off"
        autocapitalize="words"
        placeholder="Name this box&hellip;"
        class="option-input"
      />
    </div>
    <p id="preset-cap-hint" class="count-hint" hidden>You&rsquo;ve saved the max of 12 boxes &mdash; delete one to add another.</p>
    <button id="preset-save-button" class="parent-action parent-action-done" type="button" disabled>Save</button>
    <button id="preset-save-cancel" class="parent-action" type="button">Not now</button>
  </div>
</div>

<!-- ============ KID MODE ============ -->
<section id="kid-screen" hidden>
  <div id="box-stage" class="box-stage">

    <button id="mystery-box" class="mystery-box" type="button" aria-label="Tap the mystery box">
      <svg viewBox="0 0 200 200" width="100%" height="100%" aria-hidden="true">
        <ellipse cx="100" cy="178" rx="70" ry="10" class="box-shadow" />
        <rect x="35" y="90" width="130" height="90" rx="10" class="box-body" />
        <rect x="35" y="90" width="130" height="20" class="box-body-highlight" />
        <rect x="20" y="65" width="160" height="34" rx="8" class="box-lid" />
        <rect x="90" y="20" width="20" height="160" class="box-ribbon-v" />
        <rect x="20" y="72" width="160" height="20" class="box-ribbon-h" />
        <path d="M 100 48 C 85 15 40 5 25 35 C 15 55 55 70 100 48 Z" class="box-bow" />
        <path d="M 100 48 C 115 15 160 5 175 35 C 185 55 145 70 100 48 Z" class="box-bow" />
        <circle cx="100" cy="48" r="10" class="box-bow-knot" />
      </svg>
    </button>

    <!-- "Closed for now" state (SPEC.md workstream B3): shown instead of
         mysteryBox when a parent has closed the box. No idle-wobble/invite
         animation, not spinnable. -->
    <div id="box-closed" class="box-closed" hidden aria-hidden="true">
      <div class="box-closed-emoji">😴</div>
      <p class="box-closed-label">Closed for now</p>
    </div>

    <div id="reveal-screen" class="reveal-screen" hidden>
      <canvas id="confetti-canvas" class="confetti-canvas"></canvas>
      <div id="reveal-emoji" class="reveal-emoji"></div>
      <div id="reveal-label" class="reveal-label"></div>
      <button id="reveal-save-button" class="reveal-save-button" type="button">Keep this box?</button>
    </div>
  </div>

  <!-- Visible grown-ups gate (SPEC.md workstream B1) — replaces the old
       invisible corner dot. Same ~1.5s hold-to-open gate; a quick tap is a
       no-op. Kids can see it but can't use it. -->
  <button id="grownups-button" class="grownups-button" type="button" aria-label="Grown-ups options">Grown-ups</button>

  <!-- One-time first-run hint (workstream B4), dismissed forever once seen. -->
  <div id="grownups-hint" class="grownups-hint" hidden>
    <span>Hold for grown-ups</span>
    <button id="grownups-hint-close" type="button" aria-label="Dismiss hint">&times;</button>
  </div>
</section>

<!-- ============ PARENT SHEET ============ -->
<div id="parent-sheet" class="sheet-backdrop" hidden>
  <div class="sheet parent-sheet-content" role="dialog" aria-modal="true" aria-label="Grown-up options">
    <button id="parent-respin" class="parent-action" type="button">Spin again</button>
    <button id="parent-newbox" class="parent-action" type="button">New box</button>
    <button id="parent-toggle-closed" class="parent-action" type="button">Close the box</button>
    <button id="parent-done" class="parent-action parent-action-done" type="button">Done</button>
  </div>
</div>

<script type="module" src="src/app.js"></script>
</body>
</html>
